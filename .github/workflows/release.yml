name: release

on:
    push:
        tags:
            - "**"

permissions:
    contents: write

env:
    CARGO_TERM_COLOR: always

jobs:
    build:
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                include:
                    - os: windows-latest
                      target: multi-proxy-downloader-win-x64.exe
                    - os: ubuntu-latest
                      target: multi-proxy-downloader-linux-x64
                    - os: macos-latest
                      target: multi-proxy-downloader-macos-arm64

        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v4
              with:
                  go-version: "stable"

            - name: Build
              run: |
                  go mod tidy
                  go build -ldflags "-w -s" -o "${{ matrix.target }}"

            - name: Prepare artifact
              run: |
                  mkdir artifact
                  mv ${{ matrix.target }} artifact

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.os }}
                  path: artifact

    release:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@v4

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: ./artifacts

            - name: Display downloaded files
              run: ls -lR ./artifacts

            - name: GH Release
              uses: softprops/action-gh-release@v2.4.1
              with:
                  body_path: .github/release-notes.md
                  files: ./artifacts/**/*
